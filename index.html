<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N维雷达图生成器</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f7fc;
      color: #1a2332;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px
    }

    h1 {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 1px;
      margin-bottom: 4px;
      color: #1a2332
    }

    h1 strong {
      font-weight: 600;
      color: #2b6cb0
    }

    .subtitle {
      color: #7890a0;
      font-size: 13px;
      margin-bottom: 20px
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      width: 100%;
      max-width: 1400px;
      align-content: flex-start
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      width: 100%
    }

    .bottom-row {
      width: 100%
    }

    .control-panel {
      flex: 1;
      min-width: 300px;
      max-width: 420px;
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
      border: 1px solid #e8edf4
    }

    .control-panel h2 {
      font-size: 14px;
      font-weight: 600;
      color: #2b6cb0;
      margin-bottom: 14px;
      letter-spacing: .5px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .dim-controls-scroll {
      max-height: 520px;
      overflow-y: auto;
      padding-right: 4px;
      position: relative
    }

    .dim-controls-scroll::-webkit-scrollbar {
      width: 4px
    }

    .dim-controls-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e0;
      border-radius: 2px
    }

    .dim-group {
      margin-bottom: 10px;
      padding: 10px 12px;
      background: #f8faff;
      border-radius: 8px;
      transition: background .15s
    }

    .dim-group:hover {
      background: #f0f6ff
    }

    .dim-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
      gap: 6px
    }

    .color-input-wrap {
      position: relative;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      margin-right: 2px
    }

    .color-input-wrap input[type=color] {
      position: absolute;
      top: -4px;
      left: -4px;
      width: 26px;
      height: 26px;
      cursor: pointer;
      border: none;
      padding: 0
    }

    .color-input-wrap:hover {
      box-shadow: 0 0 0 2px rgba(43, 108, 176, .3)
    }

    .dim-label-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #d0d8e4;
      color: #1a2332;
      font-size: 13px;
      padding: 2px 4px;
      width: 100px;
      outline: none;
      transition: border-color .2s
    }

    .dim-label-input:focus {
      border-bottom-color: #2b6cb0
    }

    .dim-value-display {
      font-size: 16px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 40px;
      text-align: right;
      color: #2b6cb0;
      cursor: pointer
    }

    .dim-value-display:hover {
      background: #eef2f8;
      border-radius: 3px
    }

    .dim-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      outline: none;
      background: linear-gradient(to right, #e53e3e 0%, #dce3ec 50%, #2b6cb0 100%);
      margin: 4px 0 3px;
      cursor: pointer
    }

    .dim-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: pointer;
      background: #2b6cb0;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(43, 108, 176, .3);
      transition: transform .12s
    }

    .dim-slider::-webkit-slider-thumb:hover {
      transform: scale(1.25)
    }

    .dim-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: pointer;
      background: #2b6cb0;
      border: 2px solid #fff
    }

    .dim-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #9aaec2;
      padding: 0 2px
    }

    .dim-count-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding: 8px 12px;
      background: #f0f6ff;
      border-radius: 8px
    }

    .dim-count-row label {
      font-size: 13px;
      font-weight: 500;
      color: #2b6cb0;
      white-space: nowrap
    }

    .dim-count-row input {
      width: 60px;
      padding: 4px 8px;
      border: 1px solid #d0d8e4;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #1a2332;
      text-align: center;
      outline: none;
      background: #fff
    }

    .dim-count-row input:focus {
      border-color: #2b6cb0
    }

    .chart-area {
      flex: 1;
      min-width: 420px;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      align-items: center
    }

    .chart-wrapper {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
      border: 1px solid #e8edf4;
      padding: 12px;
      width: 100%;
      position: relative;
      user-select: none
    }

    .chart-title-row {
      display: flex;
      justify-content: center;
      margin-bottom: 8px
    }

    .chart-title-input {
      background: transparent;
      border: none;
      border-bottom: 1px dashed #c0d0e0;
      color: #1a2332;
      font-size: 17px;
      font-weight: 600;
      text-align: center;
      padding: 2px 12px;
      outline: none;
      width: 300px;
      max-width: 80%;
      transition: border-color .2s
    }

    .chart-title-input:focus {
      border-bottom-style: solid;
      border-bottom-color: #2b6cb0
    }

    #chart {
      width: 100%;
      display: flex;
      justify-content: center
    }

    #chart svg {
      display: block
    }

    .chart-info {
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
      color: #7890a0
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap
    }

    .btn {
      background: #f0f4fa;
      border: 1px solid #dce3ec;
      color: #3a4a5a;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all .15s
    }

    .btn:hover {
      background: #e4ebf5;
      color: #1a2332
    }

    .btn-primary {
      background: #2b6cb0;
      border-color: #2b6cb0;
      color: #fff
    }

    .btn-primary:hover {
      background: #1e5790
    }

    .btn-success {
      background: #e8f5e9;
      border-color: #b8d8be;
      color: #2e7d32
    }

    .btn-success:hover {
      background: #d0edd4
    }

    .badge-n {
      display: inline-block;
      background: #2b6cb0;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 8px;
      border-radius: 10px;
      margin-left: 6px
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 6px 12px;
      background: #fafbfe;
      border-radius: 8px;
      border: 1px solid #eef2f8
    }

    .range-row label {
      font-size: 12px;
      color: #7890a0;
      white-space: nowrap
    }

    .range-row input {
      width: 48px;
      padding: 3px 6px;
      border: 1px solid #d0d8e4;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #1a2332;
      text-align: center;
      outline: none
    }

    .range-row input:focus {
      border-color: #2b6cb0
    }

    .range-row span {
      font-size: 12px;
      color: #9aaec2
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .35);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center
    }

    .modal-overlay.show {
      display: flex
    }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      max-width: 620px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .12)
    }

    .modal h3 {
      margin-bottom: 12px;
      font-weight: 500;
      color: #1a2332
    }

    .modal textarea {
      width: 100%;
      height: 200px;
      background: #f8faff;
      border: 1px solid #dce3ec;
      color: #1a2332;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      resize: vertical;
      outline: none
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      justify-content: flex-end
    }

    .bottom-tabs {
      display: flex;
      gap: 2px;
      background: #eef2f8;
      padding: 3px;
      border-radius: 10px;
      margin-top: 12px;
      flex-shrink: 0;
      width: 100%
    }

    .btab {
      background: transparent;
      border: none;
      color: #7890a0;
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      flex: 1
    }

    .btab:hover {
      color: #1a2332
    }

    .btab.active {
      background: #fff;
      color: #1a2332;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .08)
    }

    .side-panel {
      display: none;
      width: 100%;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
      border: 1px solid #e8edf4;
      padding: 14px;
      height: 180px;
      overflow-y: auto;
      flex-shrink: 0
    }

    .side-panel.show {
      display: block
    }

    .side-panel::-webkit-scrollbar {
      width: 4px
    }

    .side-panel::-webkit-scrollbar-thumb {
      background: #cbd5e0;
      border-radius: 2px
    }

    .bm-item,
    .hist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      margin-bottom: 4px;
      background: #f8faff;
      border-radius: 6px;
      font-size: 13px;
      cursor: default
    }

    .bm-item:hover,
    .hist-item:hover {
      background: #f0f6ff
    }

    .bm-item span,
    .hist-item span {
      color: #1a2332;
      font-weight: 500;
      cursor: pointer
    }

    .bm-item span:hover,
    .hist-item span:hover {
      color: #2b6cb0
    }

    .bm-item .btn-sm,
    .hist-item .btn-sm {
      background: transparent;
      border: none;
      color: #b0c0d0;
      padding: 2px 5px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: color .15s
    }

    .bm-item .btn-sm:hover,
    .hist-item .btn-sm:hover {
      color: #e53e3e
    }

    .line {
      width: 100%;
      border-bottom: solid 2px #d6d6d6;
      height: 5px;
      margin-bottom: 2px;
    }

    .br {
      width: 100%;
    }
  </style>
</head>

<body>
  <h1><strong id="Ndisplay">6</strong>维雷达图生成器</h1>
  <p class="subtitle"> </p>
  <div class="container">
    <div class="control-panel">
      <div class="dim-count-row">
        <label>维度数量</label>
        <input type="number" id="dimCount" value="6" min="3" max="36">
        <button class="btn btn-primary" onclick="setDimCount()">确定</button>
      </div>
      <h2>范围设置</h2>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:13px;color:#2b6cb0">
          <input type="checkbox" id="gradeMode" onchange="toggleGradeMode()">
          等级评分模式
        </label>
      </div>
      <div class="range-row" id="rangeRow">
        <label>最小值</label>
        <input type="number" id="rangeMin" value="-100" oninput="onRangeChange()">
        <span>~</span>
        <input type="number" id="rangeMax" value="100" oninput="onRangeChange()">
        <label>最大值</label>
      </div>
      <h2>维度控制 <span class="badge-n" id="dimBadge">6</span></h2>
      <div class="dim-controls-scroll" id="dim-controls"></div>
      <div class="actions">
        <button class="btn" onclick="randomize()">随机</button>
        <button class="btn" onclick="resetAll()">重置</button>
        <div class="line"></div>
        <p class="subtitle">导出</p>
        <div class="br"></div>
        <button class="btn btn-primary" onclick="exportSVG()">SVG</button>
        <button class="btn btn-primary" onclick="exportPNG()">PNG</button>
        <button class="btn btn-primary" onclick="exportJPEG()">JPEG</button>
        <button class="btn btn-success" onclick="exportData()">导出Json</button>
        <button class="btn" onclick="importData()">导入Json</button>
      </div>
    </div>
    <div class="chart-area">
      <div class="chart-wrapper">
        <div class="chart-title-row"><input class="chart-title-input" type="text" id="chartTitle" value="6维雷达图"
            oninput="draw()"></div>
        <div id="chart"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin:6px 0 0;font-size:13px;color:#7890a0">
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
          <input type="checkbox" id="showValuesCheck" checked onchange="draw()">
          显示数值标签
        </label>
      </div>
    </div>
    <div class="bottom-tabs">
      <button class="btab" data-tab="bookmarks" onclick="switchTab('bookmarks')">书签</button>
      <button class="btab" data-tab="history" onclick="switchTab('history')">历史</button>
    </div>
    <div id="bookmarksPanel" class="side-panel">
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <input type="text" id="bmName" placeholder="书签名称…"
          style="flex:1;padding:5px 8px;border:1px solid #d0d8e4;border-radius:6px;font-size:13px;outline:none"
          onkeydown="if(event.key==='Enter')saveBookmark()">
        <button class="btn btn-primary" onclick="saveBookmark()">保存</button>
      </div>
      <div id="bookmarksList"></div>
    </div>
    <div id="historyPanel" class="side-panel">
      <div style="display:flex;gap:6px;margin-bottom:10px;align-items:center">
        <span style="font-size:13px;color:#7890a0" id="historyInfo">每次修改自动记录</span>
        <button class="btn" onclick="clearHistory()">清空</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>
  <div class="modal-overlay" id="exportModal">
    <div class="modal">
      <h3 id="modalTitle">导出</h3>
      <textarea id="exportText" readonly></textarea>
      <div class="modal-actions">
        <button class="btn" onclick="copyExport()">复制</button>
        <button class="btn" onclick="closeExport()">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const COLOR_STOPS = ['#2b6cb0', '#3182ce', '#4299e1', '#63b3ed', '#90cdf4', '#38a169', '#48bb78', '#68d391', '#9ae6b4', '#805ad5', '#9f7aea', '#b794f4', '#d53f8c', '#ed64a6', '#f687b3', '#dd6b20', '#ed8936', '#f6ad55', '#e53e3e', '#fc8181', '#718096', '#a0aec0', '#2c5282', '#276749', '#6b46c1', '#97266d', '#9c4221', '#9b2c2c', '#234e52', '#22543d', '#44337a', '#702459', '#652b19', '#63171b', '#1a365d', '#1a4731'];
    const INIT_COLORS = ['#2b6cb0', '#3182ce', '#4299e1', '#63b3ed', '#90cdf4', '#38a169'];
    const GRADES = ['N/A', 'F-', 'F', 'F+', 'E-', 'E', 'E+', 'D-', 'D', 'D+', 'C-', 'C', 'C+', 'B-', 'B', 'B+', 'A-', 'A', 'A+', 'S-', 'S', 'S+'];

    let state = { n: 6, labels: ['维度A', '维度B', '维度C', '维度D', '维度E', '维度F'], values: [50, 50, 50, 50, 50, 50], title: '6维雷达图', minVal: -100, maxVal: 100, colors: [...INIT_COLORS], gradeMode: false };

    function getColor(i) { return state.colors[i] || COLOR_STOPS[i % COLOR_STOPS.length] }
    function clamp(v) { return Math.min(state.maxVal, Math.max(state.minVal, v)) }
    function userToDisplay(v) { const r = state.maxVal - state.minVal; return r === 0 ? 0 : -100 + 200 * (v - state.minVal) / r }
    function displayToUser(d) { return state.minVal + (d + 100) / 200 * (state.maxVal - state.minVal) }
    function getDefTitle(n) { return n + '维雷达图' }
    function valueToGrade(v) { const idx = Math.round(v / 100 * (GRADES.length - 1)); return GRADES[Math.max(0, Math.min(idx, GRADES.length - 1))] }
    function gradeToValue(g) { const idx = GRADES.indexOf(g); if (idx < 0) return 0; return idx / (GRADES.length - 1) * 100 }
    function toggleGradeMode() {
      const cb = document.getElementById('gradeMode'); state.gradeMode = cb.checked;
      if (state.gradeMode) {
        state._savedMin = state.minVal; state._savedMax = state.maxVal;
        state.minVal = 0; state.maxVal = 100;
        document.getElementById('rangeRow').style.display = 'none';
      } else {
        state.minVal = state._savedMin || -100; state.maxVal = state._savedMax || 100;
        document.getElementById('rangeRow').style.display = 'flex';
      }
      // 确保所有值在当前 [minVal, maxVal] 范围内
      for (let i = 0; i < state.n; i++) state.values[i] = clamp(state.values[i]);
      document.getElementById('rangeMin').value = state.minVal; document.getElementById('rangeMax').value = state.maxVal;
      buildControls(); draw();
    }
    function syncSlider(i, v) { const sl = document.querySelector('.dim-slider[data-idx="' + i + '"]'); if (sl) sl.value = state.gradeMode ? v / 100 : (userToDisplay(v) + 100) / 200; const el = document.getElementById('val-' + i); if (el) el.textContent = state.gradeMode ? valueToGrade(v) : Math.round(v) }
    function buildControls() {
      const n = state.n, cont = document.getElementById('dim-controls'); cont.innerHTML = '';
      for (let i = 0; i < n; i++) {
        const c = getColor(i), grp = document.createElement('div'); grp.className = 'dim-group';
        const wrap = document.createElement('div'); wrap.className = 'color-input-wrap'; wrap.style.background = c;
        const picker = document.createElement('input'); picker.type = 'color'; picker.value = c; picker.title = '修改颜色';
        picker.oninput = function () { const v = this.value; state.colors[i] = v; wrap.style.background = v; draw(); };
        wrap.appendChild(picker);
        const dk = document.createElement('div'); dk.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:4px';
        const lb = document.createElement('input'); lb.className = 'dim-label-input'; lb.type = 'text'; lb.value = state.labels[i]; lb.oninput = function () { updateLabel(i, this.value) };
        const vl = document.createElement('span'); vl.id = 'val-' + i; vl.className = 'dim-value-display'; vl.textContent = state.gradeMode ? valueToGrade(state.values[i]) : Math.round(state.values[i]); vl.style.color = c; vl.ondblclick = function () { makeEditable(i) };
        dk.appendChild(wrap); dk.appendChild(lb); dk.appendChild(vl);
        const sl = document.createElement('input'); sl.className = 'dim-slider'; sl.type = 'range'; sl.min = '0'; sl.max = '1'; sl.step = state.gradeMode ? String(1 / (GRADES.length - 1)) : '0.001'; sl.value = state.gradeMode ? state.values[i] / 100 : (userToDisplay(state.values[i]) + 100) / 200; sl.dataset.idx = i; sl.oninput = function () { updateSlider(i, this.value) };
        if (state.gradeMode) { const lm = document.createElement('div'); lm.className = 'dim-labels'; lm.innerHTML = '<span>F-</span><span>' + valueToGrade(50) + '</span><span>S+</span>'; grp.appendChild(lm) } else {
          const lm = document.createElement('div'); lm.className = 'dim-labels'; lm.innerHTML = '<span>' + state.minVal + '</span><span>' + Math.round(displayToUser(0)) + '</span><span>' + state.maxVal + '</span>'; grp.appendChild(lm)
        }
        grp.appendChild(dk); grp.appendChild(sl);
        cont.appendChild(grp);
      }
      document.getElementById('dimBadge').textContent = n;
      document.getElementById('rangeMin').value = state.minVal; document.getElementById('rangeMax').value = state.maxVal;
    }
    function makeEditable(i) {
      const el = document.getElementById('val-' + i), cur = el.textContent;
      if (state.gradeMode) {
        const sel = document.createElement('select'); sel.style.cssText = 'width:65px;font-size:16px;font-weight:600;text-align:right;border:1px solid #2b6cb0;border-radius:4px;outline:none;color:' + getColor(i) + ';background:#f0f6ff;font-family:inherit';
        GRADES.forEach(function (g) { var o = document.createElement('option'); o.value = g; o.textContent = g; if (g === cur) o.selected = true; sel.appendChild(o) });
        el.replaceWith(sel); sel.focus();

    // --- Drag helper ---
    function makeDraggable2(svg, handle, i, cx, cy, angle, maxR) {
      let dragging = false;
      handle.call(d3.drag().on('start', function () { dragging = true; svg.style('cursor', 'grabbing') }).on('drag', function (e) {
        if (!dragging) return; const [mx, my] = d3.pointer(e, svg.node()), dx = mx - cx, dy = my - cy;
        const proj = dx * Math.cos(angle) + dy * Math.sin(angle);
        const ov = Math.max(0, state.minVal);
        let v;
        if (proj < 0) {
          // 负半轴：proj∈[-maxR, 0) → v∈[minVal, originVal)
          v = ov + (proj / maxR) * (ov - state.minVal);
        } else {
          // 正半轴：proj∈[0, maxR] → v∈[originVal, maxVal]
          v = ov + (proj / maxR) * (Math.max(state.maxVal, ov + 0.01) - ov);
        }

      }).on('end', function () { dragging = false; svg.style('cursor', 'default'); draw() }));
    }

    // --- Radar ---
    var svg_originVal = 0, svg_maxVal = 100, svg_mr = 200, svg_minVal = 0;
    function valToRadius(v) {
      // 原点=svg_originVal，负半轴延伸，正半轴延伸
      if (v < svg_originVal) return (v - svg_originVal) / (svg_originVal - svg_minVal) * svg_mr;
      return (v - svg_originVal) / (svg_maxVal - svg_originVal) * svg_mr;
    }
    function drawRadar(container) {
      const n = state.n, size = Math.min((container.parentElement.clientWidth || 680) - 24, 720), av = size + 30, mar = 75, mr = (size - mar * 2) / 2, cx = av / 2, cy = av / 2;
      const svg = d3.select(container).append('svg').attr('width', av).attr('height', av).attr('viewBox', '0 0 ' + av + ' ' + av);
      svg.append('text').attr('x', cx).attr('y', 15).attr('text-anchor', 'middle').attr('fill', '#1a2332').attr('font-size', '16px').attr('font-weight', '600').attr('dy', '0.35em').text(state.title || getDefTitle(n));
      const as = Math.PI * 2 / n;
      const gridN = 5; // 将区间分成 gridN 份（即 gridN+1 条网格线）
      // 区间：[minVal, maxVal]，保证最大值>0 且最小值<最大值
      const originVal = Math.max(0, state.minVal);
      svg_originVal = originVal; svg_minVal = state.minVal; svg_maxVal = Math.max(state.maxVal, originVal + 0.01); svg_mr = mr;
      svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 2).attr('fill', '#2c3e50');
      svg.append('text').attr('x', cx + 3).attr('y', cy + 4).attr('fill', '#a0b4c8').attr('font-size', '10px').text(Math.round(originVal));
      // 正半轴画多边形网格线，负半轴只标数字
      for (let sign = -1; sign <= 1; sign += 2) {
        const sideLo = sign < 0 ? svg_minVal : svg_originVal;
        const sideHi = sign < 0 ? svg_originVal : svg_maxVal;
        const sideSpan = sideHi - sideLo;
        if (sideSpan <= 0) continue;
        for (let g = 0; g <= gridN; g++) {
          const rv = sideLo + sideSpan / gridN * g;
          const r = valToRadius(rv);
          if (sign > 0) {
            const pts = []; for (let i = 0; i < n; i++) { const a = as * i - Math.PI / 2; pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]) }
            svg.append('polygon').attr('points', pts.map(p => p.join(',')).join(' ')).attr('fill', 'none').attr('stroke', '#dde4ee').attr('stroke-width', 1);
          }
          svg.append('text').attr('x', cx + 3).attr('y', cy - r + 4).attr('fill', '#a0b4c8').attr('font-size', '10px').text(Math.round(rv));
        }
      }
      const ad = [];
      for (let i = 0; i < n; i++) { const a = as * i - Math.PI / 2; svg.append('line').attr('x1', cx).attr('y1', cy).attr('x2', cx + mr * Math.cos(a)).attr('y2', cy + mr * Math.sin(a)).attr('stroke', '#e0e7f0').attr('stroke-width', 1); ad.push({ i, lx: cx + (mr + 40) * Math.cos(a), ly: cy + (mr + 40) * Math.sin(a) }) }
      ad.forEach(d => { const l = state.labels[d.i]; svg.append('text').attr('x', d.lx).attr('y', d.ly).attr('text-anchor', 'middle').attr('dominant-baseline', 'middle').attr('fill', getColor(d.i)).attr('font-size', '13px').attr('font-weight', '500').text(l.length > 8 ? l.slice(0, 8) + '…' : l) });
      drawRadarPoints(svg, n, cx, cy, mr, as);
    }

    function drawRadarPoints(svg, n, cx, cy, mr, as) {
      if (!as) as = Math.PI * 2 / n;
      svg.selectAll('.data-layer').remove(); const g = svg.append('g').attr('class', 'data-layer');
      const pts = []; for (let i = 0; i < n; i++) { const a = as * i - Math.PI / 2, rr = valToRadius(state.values[i]); pts.push([cx + rr * Math.cos(a), cy + rr * Math.sin(a)]) }
      const gid = 'rg_' + (Date.now());
      const gd = svg.append('defs').append('linearGradient').attr('id', gid).attr('x1', '0%').attr('y1', '0%').attr('x2', '100%').attr('y2', '100%');
      gd.append('stop').attr('offset', '0%').attr('stop-color', '#2b6cb0').attr('stop-opacity', '.35');
      gd.append('stop').attr('offset', '100%').attr('stop-color', '#4299e1').attr('stop-opacity', '.12');

      g.append('polygon').attr('points', pts.map(p => p.join(',')).join(' ')).attr('fill', 'none').attr('stroke', '#2b6cb0').attr('stroke-width', 2).attr('stroke-linejoin', 'round').attr('opacity', n > 20 ? .7 : 1);
      const showVals = document.getElementById('showValuesCheck').checked;
      for (let i = 0; i < n; i++) {
        const a = as * i - Math.PI / 2, rr = valToRadius(state.values[i]), px = cx + rr * Math.cos(a), py = cy + rr * Math.sin(a);
        const circle = g.append('circle').attr('cx', px).attr('cy', py).attr('r', n > 12 ? 5 : 7).attr('fill', getColor(i)).attr('stroke', '#fff').attr('stroke-width', 2.5).attr('cursor', 'grab');
        if (showVals) g.append('text').attr('x', px + (n > 12 ? 10 : 12) * Math.cos(a)).attr('y', py + (n > 12 ? 10 : 12) * Math.sin(a)).attr('fill', getColor(i)).attr('font-size', n > 12 ? '10px' : '11px').attr('font-weight', '600').attr('text-anchor', 'middle').attr('dominant-baseline', 'middle').attr('pointer-events', 'none').text(state.gradeMode ? valueToGrade(state.values[i]) : Math.round(state.values[i]));
        makeDraggable2(svg, circle, i, cx, cy, a, mr);
      }
      svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 2.5).attr('fill', '#b0c8e0');
      const valsStr = state.values.slice(0, n).map(function (v) { return state.gradeMode ? valueToGrade(v) : Math.round(v) }).join(', ');
    }

      })
    }

    // --- Snapshot / sync helpers ---
    function loadSnapshot(s) { const d = JSON.parse(s); Object.assign(state, d); document.getElementById('chartTitle').value = state.title || getDefTitle(state.n); document.getElementById('dimCount').value = state.n; document.getElementById('rangeMin').value = state.minVal; document.getElementById('rangeMax').value = state.maxVal; const cb = document.getElementById('gradeMode'); if (cb) { cb.checked = state.gradeMode || false; if (state.gradeMode) { state.minVal = 0; state.maxVal = 100; document.getElementById('rangeRow').style.display = 'none' } else { document.getElementById('rangeRow').style.display = 'flex' } } buildControls(); draw() }
    function syncSliders() { for (let i = 0; i < state.n; i++)syncSlider(i, state.values[i]) }
    function titleInput() { return document.getElementById('chartTitle') }

    // --- Tabs ---
    function switchTab(name) {
      document.querySelectorAll('.btab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('show'));
      document.querySelector('.btab[data-tab="' + name + '"]').classList.add('active');
      if (name === 'bookmarks') { document.getElementById('bookmarksPanel').classList.add('show'); loadBookmarks() }
      if (name === 'history') { document.getElementById('historyPanel').classList.add('show'); loadHistory() }
    }

    // --- Init ---
    if (state.gradeMode) { document.getElementById('gradeMode').checked = true; document.getElementById('rangeRow').style.display = 'none' }
    buildControls(); draw();
    switchTab('bookmarks');
    let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(draw, 200) });
  </script>
</body>

</html>
